<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gewichtsrechner</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:10px; }
.container { max-width:600px; margin:auto; }
.card { background:white; padding:15px; margin-bottom:12px; border-radius:12px; }
label { display:block; margin-top:8px; }
input { width:100%; padding:10px; font-size:18px; }
button { margin-top:10px; width:100%; padding:12px; }
.result { margin-top:10px; font-weight:bold; color:#0078D4; }
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Länge aus Gewicht</h3>
<label>Gewicht (kg)</label>
<input id="gw" type="text" inputmode="decimal">
<label>Breite (mm)</label>
<input id="bw" type="text" inputmode="decimal">
<label>Dicke (µm)</label>
<input id="dw" type="text" inputmode="decimal">

<button onclick="calc1()">Berechnen</button>
<div id="r1" class="result"></div>
</div>

<div class="card">
<h3>Länge aus AD / ID</h3>
<label>AD (mm)</label>
<input id="ad" type="text" inputmode="decimal">
<label>ID (mm)</label>
<input id="id" type="text" inputmode="decimal">
<label>Dicke (µm)</label>
<input id="d1" type="text" inputmode="decimal">

<button onclick="calc2()">Berechnen</button>
<div id="r2" class="result"></div>
</div>

<div class="card">
<h3>Länge Wickelhöhe</h3>
<label>WH (mm)</label>
<input id="wh" type="text" inputmode="decimal">
<label>ID (mm)</label>
<input id="id2" type="text" inputmode="decimal">
<label>Dicke (µm)</label>
<input id="d2" type="text" inputmode="decimal">

<button onclick="calc3()">Berechnen</button>
<div id="r3" class="result"></div>
</div>

<div class="card">
<h3>Außendurchmesser</h3>
<label>Gewicht</label>
<input id="gw2" type="text" inputmode="decimal">
<label>Breite</label>
<input id="bw2" type="text" inputmode="decimal">
<label>ID</label>
<input id="id3" type="text" inputmode="decimal">

<button onclick="calc4()">Berechnen</button>
<div id="r4" class="result"></div>
</div>

<div class="card">
<h3>Gewicht aus Länge</h3>
<label>Länge (m)</label>
<input id="l" type="text" inputmode="decimal">
<label>Breite</label>
<input id="b" type="text" inputmode="decimal">
<label>Dicke (µm)</label>
<input id="d3" type="text" inputmode="decimal">

<button onclick="calc5()">Berechnen</button>
<div id="r5" class="result"></div>
</div>

<div class="card">
<h3>Gewicht aus AD / ID</h3>
<label>AD</label>
<input id="ad2" type="text" inputmode="decimal">
<label>ID</label>
<input id="id4" type="text" inputmode="decimal">
<label>Breite</label>
<input id="b2" type="text" inputmode="decimal">

<button onclick="calc6()">Berechnen</button>
<div id="r6" class="result"></div>
</div>

</div>

<script>

const pi = Math.PI;
const density = 7.85;

function num(id){
    let v = document.getElementById(id).value;
    if(!v) return NaN;
    return parseFloat(v.replace(",", "."));
}

function calc1(){
let g=num("gw"), b=num("bw"), d=num("dw")/1000;
let r = (g1000)/(bddensity);
if(!isNaN(r)) r1.innerText="Länge: "+Math.round(r)+" m";
}

function calc2(){
let ad=num("ad"), id=num("id"), d=num("d1")/1000;
let r = pi(adad-idid)/(4d1000);
if(!isNaN(r)) r2.innerText="Länge: "+Math.round(r)+" m";
}

function calc3(){
let wh=num("wh"), id=num("id2"), d=num("d2")/1000;
let r = piwh(wh+id)/(d1000);
if(!isNaN(r)) r3.innerText="Länge: "+Math.round(r)+" m";
}

function calc4(){
let g=num("gw2"), b=num("bw2"), id=num("id3");
let r = Math.sqrt((4000000g)/(pidensityb)+idid);
if(!isNaN(r)) r4.innerText="AD: "+Math.round(r)+" mm";
}

function calc5(){
let l=num("l"), b=num("b"), d=num("d3")/1000;
let r = lbddensity0.001;
if(!isNaN(r)) r5.innerText="Gewicht: "+Math.round(r)+" kg";
}

function calc6(){
let ad=num("ad2"), id=num("id4"), b=num("b2");
let r = pidensityb(adad-idid)/4000000;
if(!isNaN(r)) r6.innerText="Gewicht: "+Math.round(r)+" kg";
}

</script>

</body>
</html>
