<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gewichtsrechner</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 10px;
    margin: 0;
}

h1 {
    text-align: center;
    font-size: 22px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.field {
    margin-bottom: 10px;
}

label {
    font-size: 14px;
    display: block;
    margin-bottom: 3px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.result {
    margin-top: 10px;
    font-weight: bold;
    color: #0078D4;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>📏 Gewichts- & Längenrechner</h1>

<div class="container">

<div class="card">
<h3>Länge aus Gewicht</h3>

<div class="field">
<label>Gewicht (kg)</label>
<input id="gw" type="number">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="bw" type="number">
</div>

<div class="field">
<label>Dicke (µm)</label>
<input id="dw" type="number" value="200">
</div>

<div class="result" id="r1"></div>
</div>

<div class="card">
<h3>Länge aus AD / ID</h3>

<div class="field">
<label>Außendurchmesser (mm)</label>
<input id="ad" type="number">
</div>

<div class="field">
<label>Innendurchmesser (mm)</label>
<input id="id" type="number">
</div>

<div class="field">
<label>Dicke (µm)</label>
<input id="d1" type="number" value="200">
</div>

<div class="result" id="r2"></div>
</div>

<div class="card">
<h3>Länge aus Wickelhöhe</h3>

<div class="field">
<label>Wickelhöhe (mm)</label>
<input id="wh" type="number">
</div>

<div class="field">
<label>Innendurchmesser (mm)</label>
<input id="id2" type="number">
</div>

<div class="field">
<label>Dicke (µm)</label>
<input id="d2" type="number" value="200">
</div>

<div class="result" id="r3"></div>
</div>

<div class="card">
<h3>Außendurchmesser</h3>

<div class="field">
<label>Gewicht (kg)</label>
<input id="gw2" type="number">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="bw2" type="number">
</div>

<div class="field">
<label>Innendurchmesser (mm)</label>
<input id="id3" type="number">
</div>

<div class="result" id="r4"></div>
</div>

<div class="card">
<h3>Gewicht aus Länge</h3>

<div class="field">
<label>Länge (m)</label>
<input id="l" type="number">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="b" type="number">
</div>

<div class="field">
<label>Dicke (µm)</label>
<input id="d3" type="number" value="200">
</div>

<div class="result" id="r5"></div>
</div>

<div class="card">
<h3>Gewicht aus AD / ID</h3>

<div class="field">
<label>Außendurchmesser (mm)</label>
<input id="ad2" type="number">
</div>

<div class="field">
<label>Innendurchmesser (mm)</label>
<input id="id4" type="number">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="b2" type="number">
</div>

<div class="result" id="r6"></div>
</div>

</div>

<script>

const pi = Math.PI;
const density = 7.85;

// alle Inputs überwachen
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", calculateAll);
});

function calculateAll(){

    // µm → mm Umrechnung
    let v1 = gw.value;
    let v2 = bw.value;
    let v3 = dw.value / 1000;

    if(v1 && v2 && v3){
        r1.innerText = "Länge: " + Math.round((v11000)/(v2v3density)) + " m";
    } else r1.innerText = "";

    let v4 = ad.value;
    let v5 = id.value;
    let v6 = d1.value / 1000;

    if(v4 && v5 && v6){
        r2.innerText = "Länge: " + Math.round(pi(v4v4-v5v5)/(4v61000)) + " m";
    } else r2.innerText = "";

    let v7 = wh.value;
    let v8 = id2.value;
    let v9 = d2.value / 1000;

    if(v7 && v8 && v9){
        r3.innerText = "Länge: " + Math.round(piv7(v7+v8)/(v91000)) + " m";
    } else r3.innerText = "";

    let v10 = gw2.value;
    let v11 = bw2.value;
    let v12 = id3.value;

    if(v10 && v11 && v12){
        r4.innerText = "AD: " + Math.round(Math.sqrt((4000000v10)/(pidensityv11)+v12v12)) + " mm";
    } else r4.innerText = "";

    let v13 = l.value;
    let v14 = b.value;
    let v15 = d3.value / 1000;

    if(v13 && v14 && v15){
        r5.innerText = "Gewicht: " + Math.round(v13v14v15density0.001) + " kg";
    } else r5.innerText = "";

    let v16 = ad2.value;
    let v17 = id4.value;
    let v18 = b2.value;

    if(v16 && v17 && v18){
        r6.innerText = "Gewicht: " + Math.round(pidensityv18(v16v16-v17v17)/4000000) + " kg";
    } else r6.innerText = "";
}

</script>

</body>
</html>
