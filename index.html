<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gewichtsrechner</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 10px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

label {
    display: block;
    margin-top: 8px;
}

input {
    width: 100%;
    padding: 10px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.result {
    margin-top: 10px;
    font-weight: bold;
    color: #0078D4;
    min-height: 20px;
}
</style>
</head>

<body>

<div class="container">

<!-- 1 -->
<div class="card">
<h3>Länge aus Gewicht</h3>

<label>Gewicht (kg)</label>
<input id="gw" type="text" inputmode="decimal" oninput="calc1()">

<label>Breite (mm)</label>
<input id="bw" type="text" inputmode="decimal" oninput="calc1()">

<label>Dicke (µm)</label>
<input id="dw" type="text" inputmode="decimal" oninput="calc1()">

<div class="result" id="r1"></div>
</div>

<!-- 2 -->
<div class="card">
<h3>Länge aus AD / ID</h3>

<label>Außendurchmesser (mm)</label>
<input id="ad" type="text" inputmode="decimal" oninput="calc2()">

<label>Innendurchmesser (mm)</label>
<input id="id" type="text" inputmode="decimal" oninput="calc2()">

<label>Dicke (µm)</label>
<input id="d1" type="text" inputmode="decimal" oninput="calc2()">

<div class="result" id="r2"></div>
</div>

<!-- 3 -->
<div class="card">
<h3>Länge aus Wickelhöhe</h3>

<label>Wickelhöhe (mm)</label>
<input id="wh" type="text" inputmode="decimal" oninput="calc3()">

<label>Innendurchmesser (mm)</label>
<input id="id2" type="text" inputmode="decimal" oninput="calc3()">

<label>Dicke (µm)</label>
<input id="d2" type="text" inputmode="decimal" oninput="calc3()">

<div class="result" id="r3"></div>
</div>

<!-- 4 -->
<div class="card">
<h3>Außendurchmesser</h3>

<label>Gewicht (kg)</label>
<input id="gw2" type="text" inputmode="decimal" oninput="calc4()">

<label>Breite (mm)</label>
<input id="bw2" type="text" inputmode="decimal" oninput="calc4()">

<label>Innendurchmesser (mm)</label>
<input id="id3" type="text" inputmode="decimal" oninput="calc4()">

<div class="result" id="r4"></div>
</div>

<!-- 5 -->
<div class="card">
<h3>Gewicht aus Länge</h3>

<label>Länge (m)</label>
<input id="l" type="text" inputmode="decimal" oninput="calc5()">

<label>Breite (mm)</label>
<input id="b" type="text" inputmode="decimal" oninput="calc5()">

<label>Dicke (µm)</label>
<input id="d3" type="text" inputmode="decimal" oninput="calc5()">

<div class="result" id="r5"></div>
</div>

<!-- 6 -->
<div class="card">
<h3>Gewicht aus AD / ID</h3>

<label>Außendurchmesser (mm)</label>
<input id="ad2" type="text" inputmode="decimal" oninput="calc6()">

<label>Innendurchmesser (mm)</label>
<input id="id4" type="text" inputmode="decimal" oninput="calc6()">

<label>Breite (mm)</label>
<input id="b2" type="text" inputmode="decimal" oninput="calc6()">

<div class="result" id="r6"></div>
</div>

</div>

<script>

const pi = Math.PI;
const density = 7.85;

// sichere Zahl
function num(id){
    let v = document.getElementById(id).value;
    if(!v) return NaN;
    v = v.replace(",", ".");
    return parseFloat(v);
}

// 1
function calc1(){
    let g = num("gw");
    let b = num("bw");
    let d = num("dw") / 1000;
    let out = document.getElementById("r1");

    if(!isNaN(g) && !isNaN(b) && !isNaN(d)){
        let r = (g * 1000) / (b * d * density);
        out.innerText = "Länge: " + Math.round(r) + " m";
    } else {
        out.innerText = "";
    }
}

// 2
function calc2(){
    let ad = num("ad");
    let id = num("id");
    let d = num("d1") / 1000;
    let out = document.getElementById("r2");

    if(!isNaN(ad) && !isNaN(id) && !isNaN(d)){
        let r = pi * (ad*ad - id*id) / (4 * d * 1000);
        out.innerText = "Länge: " + Math.round(r) + " m";
    } else {
        out.innerText = "";
    }
}

// 3
function calc3(){
    let wh = num("wh");
    let id = num("id2");
    let d = num("d2") / 1000;
    let out = document.getElementById("r3");

    if(!isNaN(wh) && !isNaN(id) && !isNaN(d)){
        let r = pi * wh * (wh + id) / (d * 1000);
        out.innerText = "Länge: " + Math.round(r) + " m";
    } else {
        out.innerText = "";
    }
}

// 4
function calc4(){
    let g = num("gw2");
    let b = num("bw2");
    let id = num("id3");
    let out = document.getElementById("r4");

    if(!isNaN(g) && !isNaN(b) && !isNaN(id)){
        let r = Math.sqrt((4000000 * g) / (pi * density * b) + id*id);
        out.innerText = "AD: " + Math.round(r) + " mm";
    } else {
        out.innerText = "";
    }
}

// 5
function calc5(){
    let l = num("l");
    let b = num("b");
    let d = num("d3") / 1000;
    let out = document.getElementById("r5");

    if(!isNaN(l) && !isNaN(b) && !isNaN(d)){
        let r = l * b * d * density * 0.001;
        out.innerText = "Gewicht: " + Math.round(r) + " kg";
    } else {
        out.innerText = "";
    }
}

// 6
function calc6(){
    let ad = num("ad2");
    let id = num("id4");
    let b = num("b2");
    let out = document.getElementById("r6");

    if(!isNaN(ad) && !isNaN(id) && !isNaN(b)){
        let r = pi * density * b * (ad*ad - id*id) / 4000000;
        out.innerText = "Gewicht: " + Math.round(r) + " kg";
    } else {
        out.innerText = "";
    }
}

</script>

</body>
</html>
