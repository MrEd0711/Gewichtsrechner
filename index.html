<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gewichtsrechner</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 10px;
    margin: 0;
}

h1 {
    text-align: center;
    font-size: 22px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.field {
    margin-bottom: 10px;
}

label {
    font-size: 14px;
    display: block;
    margin-bottom: 3px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.result {
    margin-top: 10px;
    font-weight: bold;
    color: #0078D4;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>📏 Gewichts- & Längenrechner</h1>

<div class="container">

<div class="card">
<h3>Länge aus Gewicht</h3>

<div class="field">
<label>Gewicht (kg)</label>
<input id="gw" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="bw" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Dicke (mm)</label>
<input id="dw" type="text" inputmode="decimal" value="0," pattern="[0-9,]*">
</div>

<div class="result" id="r1"></div>
</div>

<div class="card">
<h3>Länge aus AD / ID</h3>

<div class="field">
<label>Außendurchmesser (mm)</label>
<input id="ad" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Innendurchmesser (mm)</label>
<input id="id" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Dicke (mm)</label>
<input id="d1" type="text" inputmode="decimal" value="0," pattern="[0-9,]*">
</div>

<div class="result" id="r2"></div>
</div>

<div class="card">
<h3>Länge aus Wickelhöhe</h3>

<div class="field">
<label>Wickelhöhe (mm)</label>
<input id="wh" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Innendurchmesser (mm)</label>
<input id="id2" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Dicke (mm)</label>
<input id="d2" type="text" inputmode="decimal" value="0," pattern="[0-9,]*">
</div>

<div class="result" id="r3"></div>
</div>

<div class="card">
<h3>Außendurchmesser</h3>

<div class="field">
<label>Gewicht (kg)</label>
<input id="gw2" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="bw2" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Innendurchmesser (mm)</label>
<input id="id3" type="number" inputmode="decimal">
</div>

<div class="result" id="r4"></div>
</div>

<div class="card">
<h3>Gewicht aus Länge</h3>

<div class="field">
<label>Länge (m)</label>
<input id="l" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="b" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Dicke (mm)</label>
<input id="d3" type="text" inputmode="decimal" value="0," pattern="[0-9,]*">
</div>

<div class="result" id="r5"></div>
</div>

<div class="card">
<h3>Gewicht aus AD / ID</h3>

<div class="field">
<label>Außendurchmesser (mm)</label>
<input id="ad2" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Innendurchmesser (mm)</label>
<input id="id4" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="b2" type="number" inputmode="decimal">
</div>

<div class="result" id="r6"></div>
</div>

</div>

<script>

const pi = Math.PI;
const density = 7.85;

// sichere Zahl-Umwandlung
function parse(val){
    if(!val) return NaN;
    return parseFloat(val.replace(",", "."));
}

// alle Inputs beobachten
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", calculateAll);
});

function calcOK(...vals){
    return vals.every(v => !isNaN(v) && v > 0);
}

function calculateAll(){

    // 1
    let v1 = parse(gw.value);
    let v2 = parse(bw.value);
    let v3 = parse(dw.value);

    if(calcOK(v1,v2,v3)){
        r1.innerText = "Länge: " + Math.round((v11000)/(v2v3density)) + " m";
    } else r1.innerText = "";

    // 2
    let v4 = parse(ad.value);
    let v5 = parse(id.value);
    let v6 = parse(d1.value);

    if(calcOK(v4,v5,v6)){
        r2.innerText = "Länge: " + Math.round(pi(v4v4-v5v5)/(4v61000)) + " m";
    } else r2.innerText = "";

    // 3
    let v7 = parse(wh.value);
    let v8 = parse(id2.value);
    let v9 = parse(d2.value);

    if(calcOK(v7,v8,v9)){
        r3.innerText = "Länge: " + Math.round(piv7(v7+v8)/(v91000)) + " m";
    } else r3.innerText = "";

    // 4
    let v10 = parse(gw2.value);
    let v11 = parse(bw2.value);
    let v12 = parse(id3.value);

    if(calcOK(v10,v11,v12)){
        r4.innerText = "AD: " + Math.round(Math.sqrt((4000000v10)/(pidensityv11)+v12v12)) + " mm";
    } else r4.innerText = "";

    // 5
    let v13 = parse(l.value);
    let v14 = parse(b.value);
    let v15 = parse(d3.value);

    if(calcOK(v13,v14,v15)){
        r5.innerText = "Gewicht: " + Math.round(v13v14v15density0.001) + " kg";
    } else r5.innerText = "";

    // 6
    let v16 = parse(ad2.value);
    let v17 = parse(id4.value);
    let v18 = parse(b2.value);

    if(calcOK(v16,v17,v18)){
        r6.innerText = "Gewicht: " + Math.round(pidensityv18(v16v16-v17v17)/4000000) + " kg";
    } else r6.innerText = "";
}

</script>

</body>
</html>
