<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gewichtsrechner</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 10px;
    margin: 0;
}

h1 {
    text-align: center;
    font-size: 22px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card h3 {
    font-size: 16px;
}

.form {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.field {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 14px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.result {
    margin-top: 10px;
    font-weight: bold;
    color: #0078D4;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>📏 Gewichts- & Längenrechner</h1>

<div class="container">

<div class="card">
<h3>Länge aus Gewicht</h3>

<div class="form">
<input id="gw" type="number" inputmode="decimal" placeholder="Gewicht">
<input id="bw" type="number" inputmode="decimal" placeholder="Breite">
<input id="dw" type="text" inputmode="decimal" value="0," pattern="[0-9,]*">
</div>

<div class="result" id="r1"></div>
</div>

<div class="card">
<h3>Länge aus AD / ID</h3>

<div class="form">
<input id="ad" type="number" inputmode="decimal" placeholder="Außend">
<input id="id" type="number" inputmode="decimal" placeholder="Innend">
<input id="d1" type="text" inputmode="decimal" value="0," pattern="[0-9,]*">
</div>

<div class="result" id="r2"></div>
</div>

<div class="card">
<h3>Länge aus Wickelhöhe</h3>

<div class="form">
<input id="wh" type="number" inputmode="decimal" placeholder="Wickelhöhe">
<input id="id2" type="number" inputmode="decimal" placeholder="Innend">
<input id="d2" type="text" inputmode="decimal" value="0," pattern="[0-9,]*">
</div>

<div class="result" id="r3"></div>
</div>

<div class="card">
<h3>Außendurchmesser</h3>

<div class="form">
<input id="gw2" type="number" inputmode="decimal" placeholder="Gewicht">
<input id="bw2" type="number" inputmode="decimal" placeholder="Breite">
<input id="id3" type="number" inputmode="decimal" placeholder="Innend">
</div>

<div class="result" id="r4"></div>
</div>

<div class="card">
<h3>Gewicht aus Länge</h3>

<div class="form">
<input id="l" type="number" inputmode="decimal" placeholder="Länge">
<input id="b" type="number" inputmode="decimal" placeholder="Breite">
<input id="d3" type="text" inputmode="decimal" value="0," pattern="[0-9,]*">
</div>

<div class="result" id="r5"></div>
</div>

<div class="card">
<h3>Gewicht aus AD / ID</h3>

<div class="form">
<input id="ad2" type="number" inputmode="decimal" placeholder="Außend">
<input id="id4" type="number" inputmode="decimal" placeholder="Innend">
<input id="b2" type="number" inputmode="decimal" placeholder="Breite">
</div>

<div class="result" id="r6"></div>
</div>

</div>

<script>

const pi = Math.PI;
const density = 7.85;

// Komma → Punkt Umwandlung
function parse(val){
    return parseFloat((val || "").replace(",", "."));
}

// automatische Berechnung
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", calculateAll);
});

function calculateAll(){

    if(gw.value && bw.value && dw.value){
        r1.innerText = "Länge: " + Math.round((parse(gw.value)1000)/(parse(bw.value)parse(dw.value)density)) + " m";
    }

    if(ad.value && id.value && d1.value){
        r2.innerText = "Länge: " + Math.round(pi(parse(ad.value)**2 - parse(id.value)**2)/(4parse(d1.value)1000)) + " m";
    }

    if(wh.value && id2.value && d2.value){
        r3.innerText = "Länge: " + Math.round(piparse(wh.value)(parse(wh.value)+parse(id2.value))/(parse(d2.value)1000)) + " m";
    }

    if(gw2.value && bw2.value && id3.value){
        r4.innerText = "AD: " + Math.round(Math.sqrt((4000000parse(gw2.value))/(pidensityparse(bw2.value)) + parse(id3.value)**2)) + " mm";
    }

    if(l.value && b.value && d3.value){
        r5.innerText = "Gewicht: " + Math.round(parse(l.value)parse(b.value)parse(d3.value)density0.001) + " kg";
    }

    if(ad2.value && id4.value && b2.value){
        r6.innerText = "Gewicht: " + Math.round(pidensityparse(b2.value)*(parse(ad2.value)**2 - parse(id4.value)**2) / 4000000) + " kg";
    }
}

</script>

</body>
</html>
