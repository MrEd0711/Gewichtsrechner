<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gewichtsrechner</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 10px;
    margin: 0;
}

h1 {
    text-align: center;
    font-size: 22px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.field {
    margin-bottom: 10px;
}

label {
    font-size: 14px;
    display: block;
    margin-bottom: 3px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.result {
    margin-top: 10px;
    font-weight: bold;
    color: #0078D4;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>📏 Gewichts- & Längenrechner</h1>

<div class="container">

<div class="card">
<h3>Länge aus Gewicht</h3>

<div class="field">
<label>Gewicht (kg)</label>
<input id="gw" type="number">
</div>

<div class="field">
<label>Breite (mm)</label>
<input id="bw" type="number">
</div>

<div class="field">
<label>Dicke (µm)</label>
<input id="dw" type="number">
</div>

<div class="result" id="r1"></div>
</div>

</div>

<script>

const pi = Math.PI;
const density = 7.85;

// sichere Werte holen
function getVal(id){
    return Number(document.getElementById(id).value);
}

function calculateAll(){

    let v1 = getVal("gw");
    let v2 = getVal("bw");
    let v3 = getVal("dw") / 1000;

    if(!isNaN(v1) && !isNaN(v2) && !isNaN(v3) && v2 > 0 && v3 > 0){
        document.getElementById("r1").innerText =
            "Länge: " + Math.round((v11000)/(v2v3*density)) + " m";
    } else {
        document.getElementById("r1").innerText = "";
    }

}

// ALLE Inputs überwachen (wichtiger Fix!)
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", calculateAll);
        input.addEventListener("change", calculateAll);
    });
});

</script>

</body>
</html>
